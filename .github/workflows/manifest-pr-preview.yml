# Preview de registro Arc One en PRs que tocan arc-one.agent.yaml.
#
# Lógica en arc-one-manifest-tools (pin v1.0.1) — ver docs/GUIA_BBVA.md

name: Manifest PR Preview

on:
  pull_request:
    branches: [main]
    paths:
      - "arc-one.agent.yaml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: manifest-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    uses: arc-one-assurance/arc-one-manifest-tools/.github/workflows/manifest-pr-preview.yml@v1.0.1
    with:
      tools_ref: v1.0.1
      connector_patch_script: .github/scripts/patch-manifest-connector.sh
      arc_one_ui_url: https://arc-one-sandbox.web.app
      workspace_label: ws_bbva_poc
    secrets: inherit
