# Publica una nueva versión de Nova BBVA AWS en Arc One (ws_bbva_poc).
#
# Se dispara al mergear cambios en arc-one.agent.yaml en main.
# En PRs, usar workflow "Manifest PR Preview".

name: Register with Arc One

on:
  workflow_dispatch:
    inputs:
      dry_run_only:
        description: "Solo CI Gate + dry-run (no publicar versión)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "arc-one.agent.yaml"

concurrency:
  group: register-arc-one-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  register:
    name: Publicar versión
    runs-on: ubuntu-latest
    environment: arc-one-registration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml httpx

      - name: Patch connector URL
        env:
          AWS_SERVICE_URL: ${{ secrets.AWS_SERVICE_URL }}
        run: |
          chmod +x .github/scripts/patch-manifest-connector.sh
          .github/scripts/patch-manifest-connector.sh arc-one.agent.yaml arc-one.agent.resolved.yaml

      - name: CI Gate — manifest drift + semver
        id: gate
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_AGENT_ID: ${{ secrets.ARC_ONE_AGENT_ID }}
        run: |
          python scripts/ci_manifest_gate.py arc-one.agent.resolved.yaml | tee gate.log
          if grep -q "CI Gate OK: no drift" gate.log; then
            echo "skip_apply=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sin cambios material (skip registro)
        if: steps.gate.outputs.skip_apply == 'true'
        run: |
          echo "Manifest sin drift vs Arc One — no se publica versión duplicada." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Dry-run registration
        if: steps.gate.outputs.skip_apply != 'true'
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_REGISTRATION_OWNER_USER_ID: ${{ secrets.ARC_ONE_REGISTRATION_OWNER_USER_ID }}
        run: python scripts/register_arc_one_manifest.py arc-one.agent.resolved.yaml --dry-run

      - name: Apply registration (new version)
        id: apply
        if: ${{ steps.gate.outputs.skip_apply != 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run_only)) }}
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_REGISTRATION_OWNER_USER_ID: ${{ secrets.ARC_ONE_REGISTRATION_OWNER_USER_ID }}
        run: |
          python scripts/register_arc_one_manifest.py arc-one.agent.resolved.yaml | tee registration.json
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          cat registration.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Resumen — versión publicada
        if: steps.apply.outcome == 'success'
        env:
          AWS_SERVICE_URL: ${{ secrets.AWS_SERVICE_URL }}
          ARC_ONE_AGENT_ID: ${{ secrets.ARC_ONE_AGENT_ID }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          data = json.load(open("registration.json"))
          agent_id = data.get("id") or os.environ.get("ARC_ONE_AGENT_ID", "")
          version = data.get("versionNumber") or "?"
          mode = data.get("mode") or "?"
          estado = data.get("estado") or "?"
          base = (os.environ.get("AWS_SERVICE_URL") or "").rstrip("/")
          print("## ✅ Nova BBVA AWS — versión registrada en Arc One")
          print()
          print("| Campo | Valor |")
          print("|-------|-------|")
          print(f"| agent_id | `{agent_id}` |")
          print(f"| Versión | `{version}` |")
          print(f"| Modo | {mode} |")
          print(f"| Estado | {estado} |")
          print()
          print("### Ver en Arc One")
          print("- [Sandbox](https://arc-one-sandbox.web.app) → login `tecnico@bbva.assurance.demo`")
          print("- Workspace **BBVA PoC** (`ws_bbva_poc`)")
          print()
          if base:
              print("### Endpoint del agente (AWS ECS)")
              print(f"- Chat: `{base}/api/v1/chat`")
          PY
