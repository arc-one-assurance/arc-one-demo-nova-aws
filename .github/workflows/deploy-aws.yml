name: Deploy AWS (ECS Fargate)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'arc-one/nova-bbva-aws' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'nova-bbva-aws' }}
  ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME || 'nova-bbva-aws' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap (idempotent)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/aws/*.sh
          ./scripts/aws/bootstrap.sh

      - name: Deploy ECS Fargate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          source .aws-bootstrap/env.sh
          ./scripts/aws/deploy.sh

      - name: Print service URL
        run: |
          source .aws-bootstrap/env.sh
          echo "AWS_SERVICE_URL=${AWS_SERVICE_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "Chat: ${AWS_SERVICE_URL}/api/v1/chat"
